<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Turismo">
    <title>Turismo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link rel="stylesheet" href="./../css/style.css">
</head>

<body>
    <!-- Cambiado de "display: none" a "display: flex" para que se vea directo si no hay pantalla de inicio -->
    <div id="model-screen" class="screen" style="display: flex; flex-direction: column;">

        <div class="carousel-header">
            <button id="back-btn" class="icon-btn" title="Volver">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </button>
            <span class="carousel-counter"><span id="current-index">1</span> / <span id="total-models">0</span></span>
        </div>

        <!-- Track del carrusel -->
        <div class="carousel-wrapper">
            <div class="carousel-track" id="carousel-track"></div>
        </div>

        <!-- Info + navegación -->
        <div class="model-info-panel">
            <!-- AGREGADO: Espacio para que el JS renderice el texto sin romper la consola -->
            <div class="model-text-container" style="text-align: center; margin-bottom: 15px;">
                <h2 id="model-name"></h2>
                <p id="model-desc"></p>
            </div>

            <div class="carousel-nav">
                <button id="prev-btn" class="nav-btn" aria-label="Anterior">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M15 18l-6-6 6-6" />
                    </svg>
                </button>

                <div class="dots" id="dots-container">
                    <!-- generados por JS -->
                </div>

                <button id="next-btn" class="nav-btn" aria-label="Siguiente">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M9 18l6-6-6-6" />
                    </svg>
                </button>
            </div>

            <button id="ar-button" class="ar-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <path d="M8 21h8M12 17v4" />
                </svg>
                Ver en AR
            </button>
        </div>

    </div>

    <!-- ── Contenedor AR ── -->
    <div id="ar-container" style="display: none;">
        <div class="ar-content">
            <model-viewer id="ar-model" ar ar-scale="auto" camera-controls auto-rotate environment-image="neutral"
                shadow-intensity="1.5" exposure="1" shadow-softness="0.8" alt="Modelo 3D">
                <div class="progress-bar hide" slot="progress-bar">
                    <div class="update-bar"></div>
                </div>
            </model-viewer>
            <div class="ar-controls">
                <button id="exit-ar-btn" class="control-btn" type="button">Salir AR</button>
            </div>
        </div>
    </div>

    <script src="./../js/main.js"></script>
</body>

</html>
